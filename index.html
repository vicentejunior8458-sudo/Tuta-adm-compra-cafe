<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM | Tuta Café</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3e2723; --accent: #8d6e63; --bg: #f4f4f4; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 14px; }
        
        header { background: var(--primary); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }

        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .box h2 { font-size: 16px; margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-blue { background: #1565c0; }
        .btn:hover { opacity: 0.9; }

        .table-container { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; background: #fafafa; padding: 12px; border-bottom: 2px solid #eee; color: #666; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .badge-corretor { background: #e3f2fd; color: #1565c0; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .status-pago { background: #e8f5e9; color: var(--success); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .status-pendente { background: #ffebee; color: var(--danger); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        
        .btn-action { padding: 6px 10px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-action:hover { background: #f0f0f0; }

        /* ESTILO DE IMPRESSÃO - CONFIGURAÇÃO COMPLETA */
        #printArea { display: none; }
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none; }
            #printArea { display: block; width: 100%; }
            .receipt { 
                border: 1px solid #000; padding: 30px; margin: 10px; font-family: sans-serif;
                page-break-after: always; color: black; line-height: 1.6;
            }
            .receipt h2 { text-align: center; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
            .info-row { margin-bottom: 10px; border-bottom: 1px dotted #ccc; padding-bottom: 5px; }
            .sig-area { display: flex; justify-content: space-between; margin-top: 60px; }
            .sig-box { border-top: 1px solid #000; width: 45%; text-align: center; padding-top: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1>PAINEL ADM - TUTA CAFÉ</h1></header>

    <div class="grid-top">
        <div class="box">
            <h2>Cotação do Dia</h2>
            <div class="input-group">
                <div><label>NOVO 200</label><input type="number" id="p_novo"></div>
                <div><label>VELHO 200</label><input type="number" id="p_velho"></div>
                <div><label>ATÉ 300</label><input type="number" id="p_300"></div>
            </div>
            <button class="btn" onclick="salvarPrecos()">ATUALIZAR PREÇOS</button>
        </div>

        <div class="box">
            <h2>Cadastrar Corretor</h2>
            <div class="input-group" style="grid-template-columns: 1fr 1fr;">
                <div><label>USUÁRIO</label><input type="text" id="c_user"></div>
                <div><label>SENHA</label><input type="text" id="c_pass"></div>
            </div>
            <button class="btn btn-blue" onclick="salvarCorretor()">CADASTRAR ACESSO</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Corretor</th>
                    <th>Produtor</th>
                    <th>Dados Bancários</th>
                    <th>Carga / Preço</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>

<div id="printArea"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function salvarPrecos() {
        database.ref('precos').set({
            novo200: document.getElementById('p_novo').value,
            velho200: document.getElementById('p_velho').value,
            def300: document.getElementById('p_300').value
        }).then(() => alert("Preços atualizados!"));
    }

    function salvarCorretor() {
        const u = document.getElementById('c_user').value.toLowerCase().trim();
        const s = document.getElementById('c_pass').value.trim();
        if(u && s) {
            database.ref('usuarios/' + u).set({senha: s}).then(() => {
                alert("Corretor cadastrado!");
                document.getElementById('c_user').value = ""; document.getElementById('c_pass').value = "";
            });
        }
    }

    database.ref('precos').on('value', snap => {
        const p = snap.val();
        if(p){
            document.getElementById('p_novo').value = p.novo200;
            document.getElementById('p_velho').value = p.velho200;
            document.getElementById('p_300').value = p.def300;
        }
    });

    database.ref('compras').on('value', snap => {
        const body = document.getElementById('tabelaBody');
        const printArea = document.getElementById('printArea');
        body.innerHTML = ""; printArea.innerHTML = "";
        
        let lista = [];
        snap.forEach(item => { lista.push({id: item.key, ...item.val()}); });

        lista.reverse().forEach(v => {
            const stClass = v.status === 'PAGO' ? 'status-pago' : 'status-pendente';
            const valorSaca = v.valorSaca ? "R$ " + parseFloat(v.valorSaca).toLocaleString('pt-BR') : "---";

            body.innerHTML += `
                <tr>
                    <td>${v.dataHr}</td>
                    <td><span class="badge-corretor">${v.corretor || '---'}</span></td>
                    <td><b>${v.nome}</b><br><small>CPF: ${v.cpf}<br>Senha: ${v.sefaz}</small></td>
                    <td>${v.banco}<br><small>Ag: ${v.agencia} | Cc: ${v.conta}</small></td>
                    <td><b>${v.qtd} ${v.unidade}</b><br><small>${v.tipoCafe}<br><b>Saca: ${valorSaca}</b></small></td>
                    <td><span class="${stClass}">${v.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="mudarStatus('${v.id}','${v.status}')">Status</button>
                        <button class="btn-action" onclick="imprimir('${v.id}')">Imprimir</button>
                    </td>
                </tr>
            `;

            printArea.innerHTML += `
                <div class="receipt" id="rec-print-${v.id}">
                    <h2>TUTA CAFÉ - COMPROVANTE DE REGISTRO</h2>
                    <div class="info-row"><strong>CORRETOR:</strong> ${v.corretor ? v.corretor.toUpperCase() : '-'}</div>
                    <div class="info-row"><strong>DATA/HORA:</strong> ${v.dataHr}</div>
                    <div class="info-row"><strong>PRODUTOR:</strong> ${v.nome} | <strong>CPF/CNPJ:</strong> ${v.cpf}</div>
                    <div class="info-row"><strong>SENHA SEFAZ:</strong> ${v.sefaz}</div>
                    <hr>
                    <div class="info-row"><strong>BANCO:</strong> ${v.banco}</div>
                    <div class="info-row"><strong>AGÊNCIA:</strong> ${v.agencia} | <strong>CONTA:</strong> ${v.conta}</div>
                    <hr>
                    <div class="info-row"><strong>CLASSIFICAÇÃO:</strong> ${v.tipoCafe}</div>
                    <div class="info-row"><strong>QUANTIDADE:</strong> ${v.qtd} ${v.unidade}</div>
                    <div class="info-row"><strong>VALOR POR SACA:</strong> ${valorSaca}</div>
                    <div class="info-row"><strong>LOCAL DE RETIRADA:</strong> ${v.armazem}</div>
                    <div class="info-row"><strong>OBS:</strong> ${v.observacao || 'Nenhuma'}</div>
                    
                    <div class="sig-area">
                        <div class="sig-box">Assinatura do Corretor<br><small>(${v.corretor || '________________'})</small></div>
                        <div class="sig-box">Assinatura do Produtor<br><small>(________________________________)</small></div>
                    </div>
                </div>
            `;
        });
    });

    function mudarStatus(id, atual) {
        database.ref('compras/'+id).update({ status: atual === 'PENDENTE' ? 'PAGO' : 'PENDENTE' });
    }

    function imprimir(id) {
        const todos = document.querySelectorAll('.receipt');
        todos.forEach(r => r.style.display = 'none');
        document.getElementById('rec-print-' + id).style.display = 'block';
        window.print();
    }
</script>
</body>
</html>
