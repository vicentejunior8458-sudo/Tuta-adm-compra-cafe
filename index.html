<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM | Tuta Café</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3e2723; --accent: #8d6e63; --bg: #f4f4f4; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        
        header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 20px; }

        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .box h2 { font-size: 14px; margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; }
        
        .btn { background: var(--success); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-blue { background: #1565c0; }

        .table-container { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; background: #fafafa; padding: 10px; border-bottom: 2px solid #eee; font-size: 11px; color: #777; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .badge-corretor { background: #e3f2fd; color: #1565c0; padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .status-pago { color: var(--success); font-weight: bold; }
        .status-pendente { color: var(--danger); font-weight: bold; }
        
        .btn-action { padding: 5px 8px; border-radius: 5px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; margin-right: 3px; transition: 0.2s; }
        .btn-action:hover { background: #f0f0f0; border-color: #bbb; }

        /* ESTILO DE IMPRESSÃO COMPACTO */
        #printArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; }
            .receipt { 
                border: 1px solid #000; padding: 15px; margin: 0 auto; width: 90%;
                font-family: Arial, sans-serif; font-size: 11px; line-height: 1.4; color: #000;
                page-break-after: always;
            }
            .receipt h3 { text-align: center; margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #000; padding-bottom: 5px; }
            .receipt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 15px; }
            .full-row { grid-column: span 2; border-top: 1px dotted #888; padding-top: 3px; margin-top: 3px; }
            .sig-area { display: flex; justify-content: space-between; margin-top: 35px; }
            .sig-box { border-top: 1px solid #000; width: 45%; text-align: center; padding-top: 4px; font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1>TUTA CAFÉ - ADMINISTRATIVO</h1></header>

    <div class="grid-top">
        <div class="box">
            <h2>Cotação do Dia</h2>
            <div class="input-group">
                <div><label>NOVO 200</label><input type="number" id="p_novo"></div>
                <div><label>VELHO 200</label><input type="number" id="p_velho"></div>
                <div><label>ATÉ 300</label><input type="number" id="p_300"></div>
            </div>
            <button class="btn" onclick="salvarPrecos()">ATUALIZAR PREÇOS</button>
        </div>

        <div class="box">
            <h2>Novo Corretor</h2>
            <div class="input-group" style="grid-template-columns: 1fr 1fr;">
                <div><label>USUÁRIO</label><input type="text" id="c_user"></div>
                <div><label>SENHA</label><input type="text" id="c_pass"></div>
            </div>
            <button class="btn btn-blue" onclick="salvarCorretor()">CADASTRAR ACESSO</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Corretor</th>
                    <th>Produtor</th>
                    <th>Pagamento</th>
                    <th>Carga</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>

<div id="printArea"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function salvarPrecos() {
        database.ref('precos').set({
            novo200: document.getElementById('p_novo').value,
            velho200: document.getElementById('p_velho').value,
            def300: document.getElementById('p_300').value
        }).then(() => alert("Cotações Atualizadas!"));
    }

    function salvarCorretor() {
        const u = document.getElementById('c_user').value.toLowerCase().trim();
        const s = document.getElementById('c_pass').value.trim();
        if(u && s) {
            database.ref('usuarios/' + u).set({senha: s}).then(() => {
                alert("Acesso Criado!");
                document.getElementById('c_user').value = ""; document.getElementById('c_pass').value = "";
            });
        }
    }

    database.ref('precos').on('value', snap => {
        const p = snap.val();
        if(p){
            document.getElementById('p_novo').value = p.novo200;
            document.getElementById('p_velho').value = p.velho200;
            document.getElementById('p_300').value = p.def300;
        }
    });

    database.ref('compras').on('value', snap => {
        const body = document.getElementById('tabelaBody');
        const printArea = document.getElementById('printArea');
        body.innerHTML = ""; printArea.innerHTML = "";
        
        let lista = [];
        snap.forEach(item => { lista.push({id: item.key, ...item.val()}); });

        lista.reverse().forEach(v => {
            const stClass = v.status === 'PAGO' ? 'status-pago' : 'status-pendente';
            const valorF = v.valorSaca ? "R$ " + parseFloat(v.valorSaca).toLocaleString('pt-BR') : "---";

            body.innerHTML += `
                <tr>
                    <td><small>${v.dataHr}</small></td>
                    <td><span class="badge-corretor">${v.corretor || '---'}</span></td>
                    <td><b>${v.nome}</b><br><small>${v.cpf}</small></td>
                    <td><small>${v.banco}<br>Ag: ${v.agencia} / Cc: ${v.conta}</small></td>
                    <td><b>${v.qtd} ${v.unidade}</b><br><small>${valorF}</small></td>
                    <td><span class="${stClass}">${v.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="mudarStatus('${v.id}','${v.status}')" title="Alterar Status">✅</button>
                        <button class="btn-action" onclick="imprimir('${v.id}')" title="Imprimir Recibo">🖨️</button>
                        <button class="btn-action" onclick="remover('${v.id}')" title="Excluir" style="border-color:#ffcdd2">🗑️</button>
                    </td>
                </tr>
            `;

            printArea.innerHTML += `
                <div class="receipt" id="rec-print-${v.id}">
                    <h3>COMPRA EFETUADA - TUTA CAFÉ</h3>
                    <div class="receipt-grid">
                        <div><strong>Data:</strong> ${v.dataHr}</div>
                        <div><strong>Corretor:</strong> ${v.corretor ? v.corretor.toUpperCase() : '-'}</div>
                        <div class="full-row"><strong>Produtor:</strong> ${v.nome}</div>
                        <div><strong>CPF/CNPJ:</strong> ${v.cpf}</div>
                        <div><strong>Sefaz:</strong> ${v.sefaz}</div>
                        <div class="full-row"><strong>Banco:</strong> ${v.banco}</div>
                        <div><strong>Ag:</strong> ${v.agencia}</div>
                        <div><strong>Conta:</strong> ${v.conta}</div>
                        <div class="full-row"><strong>Classif:</strong> ${v.tipoCafe}</div>
                        <div><strong>Qtd:</strong> ${v.qtd} ${v.unidade}</div>
                        <div><strong>Vlr Saca:</strong> ${valorF}</div>
                        <div class="full-row"><strong>Local:</strong> ${v.armazem}</div>
                        <div class="full-row" style="font-size:9px"><strong>OBS:</strong> ${v.observacao || 'Nenhuma'}</div>
                    </div>
                    <div class="sig-area">
                        <div class="sig-box">Assinatura Corretor</div>
                        <div class="sig-box">Assinatura Produtor</div>
                    </div>
                </div>
            `;
        });
    });

    function mudarStatus(id, atual) {
        database.ref('compras/'+id).update({ status: atual === 'PENDENTE' ? 'PAGO' : 'PENDENTE' });
    }

    function remover(id) {
        if(confirm("Deseja EXCLUIR este registro permanentemente?")) {
            database.ref('compras/'+id).remove();
        }
    }

    function imprimir(id) {
        const todos = document.querySelectorAll('.receipt');
        todos.forEach(r => r.style.display = 'none');
        const Alvo = document.getElementById('rec-print-' + id);
        if(Alvo) {
            Alvo.style.display = 'block';
            window.print();
        }
    }
</script>
</body>
</html>
