<style>
    /* Estilos específicos para impressão do recibo */
    .receipt { display: none; }
    @media print {
        .no-print { display: none; }
        .receipt { 
            display: block; 
            border: 2px solid #333; 
            padding: 30px; 
            margin: 20px; 
            font-family: sans-serif;
            page-break-after: always;
        }
        .signature-box { display: flex; justify-content: space-between; margin-top: 60px; }
        .sig { border-top: 1px solid #000; width: 40%; text-align: center; padding-top: 5px; font-size: 12px; }
    }
    .badge-corretor { background: #e3f2fd; color: #1565c0; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
</style>

<script>
    database.ref('compras').on('value', snap => {
        const body = document.getElementById('tabelaBody');
        const printArea = document.getElementById('printArea'); // Div oculta para gerar recibos
        body.innerHTML = ""; printArea.innerHTML = "";
        
        let registros = [];
        snap.forEach(i => { registros.push({id: i.key, ...i.val()}); });

        registros.reverse().forEach(v => {
            const statusClass = v.status === 'PAGO' ? 'status-pago' : 'status-pendente';
            const val = v.valorSaca ? "R$ " + parseFloat(v.valorSaca).toLocaleString('pt-BR') : "---";

            // Linha da Tabela
            body.innerHTML += `
                <tr>
                    <td>${v.dataHr}</td>
                    <td><span class="badge-corretor">${v.corretor || '---'}</span></td>
                    <td><b>${v.nome}</b><br><small>${v.cpf}</small></td>
                    <td><span class="badge-senha">${v.sefaz}</span></td>
                    <td>${v.banco}<br>Ag: ${v.agencia} | Cc: ${v.conta}</td>
                    <td><b>${v.qtd} ${v.unidade}</b><br>Valor: ${val}</td>
                    <td><span class="${statusClass}">${v.status}</span></td>
                    <td>
                        <button onclick="toggleStatus('${v.id}','${v.status}')">Status</button>
                        <button onclick="window.print()">Imprimir</button>
                    </td>
                </tr>
            `;

            // Gerador de Recibo para Impressão
            printArea.innerHTML += `
                <div class="receipt">
                    <h2 style="text-align:center">TUTA CAFÉ - RECIBO DE COMPRA</h2>
                    <hr>
                    <p><strong>CORRETOR:</strong> ${v.corretor ? v.corretor.toUpperCase() : '---'}</p>
                    <p><strong>PRODUTOR:</strong> ${v.nome} | <strong>CPF/CNPJ:</strong> ${v.cpf}</p>
                    <p><strong>SENHA SEFAZ:</strong> ${v.sefaz}</p>
                    <hr>
                    <p><strong>CARGA:</strong> ${v.qtd} ${v.unidade} - ${v.tipoCafe}</p>
                    <p><strong>VALOR UNITÁRIO:</strong> ${val}</p>
                    <p><strong>LOCAL:</strong> ${v.armazem}</p>
                    <p><strong>DATA:</strong> ${v.dataHr}</p>
                    <div class="signature-box">
                        <div class="sig">Assinatura do Corretor<br>(${v.corretor || '________________'})</div>
                        <div class="sig">Assinatura do Produtor<br>(________________________________)</div>
                    </div>
                </div>
            `;
        });
    });
</script>
