<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel ADM | Tuta Café</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3e2723; --accent: #8d6e63; --bg: #f4f4f4; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; color: #333; }
        header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #ddd; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; background: white; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        #printArea { display: none; }
        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; }
            .receipt { border: 2px solid #000; padding: 20px; margin: 10px auto; font-family: monospace; page-break-after: always; }
            .receipt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .full-line { grid-column: span 2; border-bottom: 1px dotted #000; padding: 5px 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1>TUTA CAFÉ - ADMINISTRATIVO</h1></header>
    <div class="grid-top">
        <div class="box">
            <h2>Cotações</h2>
            <div class="input-group">
                <div><label>A RETIRAR</label><input type="text" id="p_retirar" oninput="mascaraMoeda(this)"></div>
                <div><label>POSTO ARMAZÉM</label><input type="text" id="p_armazem" oninput="mascaraMoeda(this)"></div>
            </div>
            <button class="btn" style="margin-top:10px" onclick="salvarPrecos()">ATUALIZAR PREÇOS</button>
        </div>
        <div class="box">
            <h2>Novo Corretor</h2>
            <div class="input-group">
                <input type="text" id="c_user" placeholder="Usuário">
                <input type="text" id="c_pass" placeholder="Senha">
            </div>
            <button class="btn" style="background:#1565c0; margin-top:10px" onclick="salvarCorretor()">CADASTRAR</button>
        </div>
    </div>
    <div style="overflow-x:auto" class="box">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Corretor</th>
                    <th>Produtor / SEFAZ</th>
                    <th>Carga</th>
                    <th>Valor Saca</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>
<div id="printArea"></div>

<script>
    // Configuração Firebase (Sua configuração atual)
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = v !== "0,00" ? "R$ " + v : "";
    }

    function formatarMoeda(v) {
        return parseFloat(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function salvarPrecos() {
        const r = parseFloat(document.getElementById('p_retirar').value.replace("R$ ","").replace(".","").replace(",","."));
        const a = parseFloat(document.getElementById('p_armazem').value.replace("R$ ","").replace(".","").replace(",","."));
        database.ref('precos').set({ retirar: r, armazem: a }).then(() => alert("Cotações Atualizadas!"));
    }

    function salvarCorretor() {
        const u = document.getElementById('c_user').value.toLowerCase().trim();
        const s = document.getElementById('c_pass').value.trim();
        if(u && s) database.ref('usuarios/' + u).set({senha: s}).then(() => alert("Corretor Cadastrado!"));
    }

    database.ref('precos').on('value', snap => {
        const p = snap.val();
        if(p){
            document.getElementById('p_retirar').value = formatarMoeda(p.retirar);
            document.getElementById('p_armazem').value = formatarMoeda(p.armazem);
        }
    });

    database.ref('compras').on('value', snap => {
        const body = document.getElementById('tabelaBody');
        const printArea = document.getElementById('printArea');
        body.innerHTML = ""; printArea.innerHTML = "";
        
        let dados = [];
        snap.forEach(item => { dados.push({id: item.key, ...item.val()}); });
        
        dados.reverse().forEach(v => {
            // CORREÇÃO: Puxa qtdSacas ou qtd (compatível com dados antigos)
            const sacas = v.qtdSacas || v.qtd || "0";
            const kg = v.qtdKg || "0";
            const corretor = (v.corretor || "S/N").toUpperCase();

            body.innerHTML += `
                <tr>
                    <td><small>${v.dataHr}</small></td>
                    <td><b style="color:var(--primary)">${corretor}</b></td>
                    <td><b>${v.nome}</b><br><small>Senha: ${v.sefaz || v.senhaSefaz || '---'}</small></td>
                    <td>${sacas} sc + ${kg} kg</td>
                    <td>${formatarMoeda(v.valorSaca)}</td>
                    <td style="font-weight:bold; color:${v.status === 'PAGO' ? 'green' : 'red'}">${v.status}</td>
                    <td>
                        <button onclick="mudarStatus('${v.id}','${v.status}')">✅</button>
                        <button onclick="imprimir('${v.id}')">🖨️</button>
                        <button onclick="remover('${v.id}')">🗑️</button>
                    </td>
                </tr>`;

            printArea.innerHTML += `
                <div class="receipt" id="rec-${v.id}">
                    <center><h2>TUTA CAFÉ - COMPRA</h2></center>
                    <div class="receipt-grid">
                        <div class="full-line"><strong>DATA:</strong> ${v.dataHr} | <strong>CORRETOR:</strong> ${corretor}</div>
                        <div class="full-line"><strong>PRODUTOR:</strong> ${v.nome.toUpperCase()} | <strong>CPF:</strong> ${v.cpf}</div>
                        <div class="full-line"><strong>SENHA SEFAZ:</strong> ${v.sefaz || v.senhaSefaz || '---'}</div>
                        <div class="full-line"><strong>PAGAMENTO:</strong> ${v.banco} | Ag: ${v.agencia} Cc: ${v.conta}</div>
                        <div class="full-line"><strong>CARGA:</strong> ${sacas} SACAS E ${kg}KG</div>
                        <div><strong>VALOR SACA:</strong> ${formatarMoeda(v.valorSaca)}</div>
                        <div><strong>LOCAL:</strong> ${v.armazem || 'Não informado'}</div>
                    </div>
                    <br><br>
                    <div style="display:flex; justify-content:space-between">
                        <span>____________________<br>Corretor</span>
                        <span>____________________<br>Produtor</span>
                    </div>
                </div>`;
        });
    });

    function mudarStatus(id, atual) { database.ref('compras/'+id).update({ status: atual === 'PENDENTE' ? 'PAGO' : 'PENDENTE' }); }
    function remover(id) { if(confirm("Excluir registro?")) database.ref('compras/'+id).remove(); }
    function imprimir(id) {
        document.querySelectorAll('.receipt').forEach(r => r.style.display = 'none');
        document.getElementById('rec-' + id).style.display = 'block';
        window.print();
    }
</script>
</body>
</html>
