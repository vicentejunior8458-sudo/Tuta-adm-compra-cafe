<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM | Tuta Café</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3e2723; --accent: #8d6e63; --bg: #f4f4f4; --success: #2e7d32; --danger: #c62828; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; box-sizing: border-box; }
        .btn { background: var(--success); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .table-container { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; background: #fafafa; padding: 12px; border-bottom: 2px solid #eee; font-size: 11px; color: #777; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge-corretor { background: #e3f2fd; color: #1565c0; padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .btn-action { padding: 6px 10px; border-radius: 5px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 16px; margin-right: 5px; }

        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; }
            .receipt { border: 1px solid #000; padding: 15px; margin: 0 auto; width: 95%; font-family: Arial, sans-serif; font-size: 11px; page-break-after: always; }
            .receipt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
            .full-row { grid-column: span 2; border-top: 1px dotted #888; padding-top: 3px; }
            .sig-area { display: flex; justify-content: space-between; margin-top: 35px; }
            .sig-box { border-top: 1px solid #000; width: 45%; text-align: center; padding-top: 4px; font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <header><h1>TUTA CAFÉ - ADMINISTRATIVO</h1></header>
    <div class="grid-top">
        <div class="box">
            <h2>Cotações (200/250 Def.)</h2>
            <div class="input-group">
                <div><label>A RETIRAR</label><input type="number" id="p_retirar" step="0.01"></div>
                <div><label>POSTO ARMAZÉM</label><input type="number" id="p_armazem" step="0.01"></div>
            </div>
            <button class="btn" onclick="salvarPrecos()">ATUALIZAR COTAÇÕES</button>
        </div>
        <div class="box">
            <h2>Novo Corretor</h2>
            <div class="input-group">
                <div><label>USUÁRIO</label><input type="text" id="c_user"></div>
                <div><label>SENHA</label><input type="text" id="c_pass"></div>
            </div>
            <button class="btn" style="background:#1565c0" onclick="salvarCorretor()">CADASTRAR</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Corretor</th>
                    <th>Produtor / SEFAZ</th>
                    <th>Pagamento</th>
                    <th>Carga (Sacas+Kg)</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>
<div id="printArea"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDE87l7QnjS48AT8jLOGLBDP2vwyGyHNEs",
        authDomain: "sistemacafe-e4a42.firebaseapp.com",
        databaseURL: "https://sistemacafe-e4a42-default-rtdb.firebaseio.com", 
        projectId: "sistemacafe-e4a42",
        storageBucket: "sistemacafe-e4a42.firebasestorage.app",
        messagingSenderId: "483940361596",
        appId: "1:483940361596:web:4418541808c717276c70f9"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function salvarPrecos() {
        database.ref('precos').set({
            retirar: document.getElementById('p_retirar').value,
            armazem: document.getElementById('p_armazem').value
        }).then(() => alert("Cotações Atualizadas!"));
    }

    function salvarCorretor() {
        const u = document.getElementById('c_user').value.toLowerCase().trim();
        const s = document.getElementById('c_pass').value.trim();
        if(u && s) database.ref('usuarios/' + u).set({senha: s}).then(() => alert("OK!"));
    }

    database.ref('precos').on('value', snap => {
        const p = snap.val();
        if(p){
            document.getElementById('p_retirar').value = p.retirar || "";
            document.getElementById('p_armazem').value = p.armazem || "";
        }
    });

    database.ref('compras').on('value', snap => {
        const body = document.getElementById('tabelaBody');
        const printArea = document.getElementById('printArea');
        body.innerHTML = ""; printArea.innerHTML = "";
        
        let lista = [];
        snap.forEach(item => { lista.push({id: item.key, ...item.val()}); });

        lista.reverse().forEach(v => {
            // LÓGICA DE COMPATIBILIDADE: Se qtdSacas não existir, usa a qtd antiga
            const sacas = v.qtdSacas || v.qtd || "0";
            const quilos = v.qtdKg || "0";
            const pesoTexto = quilos > 0 ? `${sacas} sc + ${quilos}kg` : `${sacas} sc`;
            
            const valorF = v.valorSaca ? "R$ " + parseFloat(v.valorSaca).toLocaleString('pt-BR') : "---";
            const stClass = v.status === 'PAGO' ? 'color:#2e7d32' : 'color:#c62828';

            body.innerHTML += `
                <tr>
                    <td><small>${v.dataHr}</small></td>
                    <td><span class="badge-corretor">${v.corretor || '---'}</span></td>
                    <td><b>${v.nome}</b><br><small>Senha: ${v.sefaz || '-'}</small></td>
                    <td><small>${v.banco || '-'}<br>Ag: ${v.agencia} / Cc: ${v.conta}</small></td>
                    <td><b>${pesoTexto}</b><br><small>Saca: ${valorF}</small></td>
                    <td style="${stClass}; font-weight:bold">${v.status}</td>
                    <td>
                        <button class="btn-action" onclick="mudarStatus('${v.id}','${v.status}')">✅</button>
                        <button class="btn-action" onclick="imprimir('${v.id}')">🖨️</button>
                        <button class="btn-action" onclick="remover('${v.id}')" style="border-color:#ffcdd2">🗑️</button>
                    </td>
                </tr>
            `;

            printArea.innerHTML += `
                <div class="receipt" id="rec-print-${v.id}">
                    <h3 style="text-align:center">COMPRA EFETUADA - TUTA CAFÉ</h3>
                    <div class="receipt-grid">
                        <div><strong>Data:</strong> ${v.dataHr}</div>
                        <div><strong>Corretor:</strong> ${v.corretor || '-'}</div>
                        <div class="full-row"><strong>Produtor:</strong> ${v.nome} | ${v.cpf}</div>
                        <div><strong>Sefaz:</strong> ${v.sefaz || '-'}</div>
                        <div class="full-row"><strong>Pagamento:</strong> ${v.banco} | Ag: ${v.agencia} Cc: ${v.conta}</div>
                        <div class="full-row"><strong>Carga:</strong> ${sacas} Sacas ${quilos > 0 ? ' e ' + quilos + 'kg' : ''} - ${v.tipoCafe}</div>
                        <div><strong>Vlr Saca:</strong> ${valorF}</div>
                        <div><strong>Local:</strong> ${v.armazem}</div>
                    </div>
                    <div class="sig-area"><div class="sig-box">Corretor</div><div class="sig-box">Produtor</div></div>
                </div>
            `;
        });
    });

    function mudarStatus(id, atual) {
        database.ref('compras/'+id).update({ status: atual === 'PENDENTE' ? 'PAGO' : 'PENDENTE' });
    }
    function remover(id) {
        if(confirm("Excluir definitivamente?")) database.ref('compras/'+id).remove();
    }
    function imprimir(id) {
        const todos = document.querySelectorAll('.receipt');
        todos.forEach(r => r.style.display = 'none');
        document.getElementById('rec-print-' + id).style.display = 'block';
        window.print();
    }
</script>
</body>
</html>
